services:
  postgres:
    image: postgres:16-alpine
    container_name: ceam-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ceam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ceam-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      CEAM_DATA_URL: ${CEAM_DATA_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ceam-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ceam-backend.rule=Host(`${BACKEND_DOMAIN}`) || (Host(`${FRONTEND_DOMAIN}`) && PathPrefix(`/api/v1`))"
      - "traefik.http.services.ceam-backend.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: ceam-frontend
    restart: always
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - ceam-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ceam-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.services.ceam-frontend.loadbalancer.server.port=3000"

volumes:
  pgdata:

networks:
  ceam-network:
    driver: bridge
